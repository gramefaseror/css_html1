<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МРО 4.1.4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="page-nav">
        <a href="index.html" class="back-link">
            <span class="arrow">←</span> Повернутись до змісту
        </a>
    </nav>

    <main class="page-container">
        <header class="page-header">
            <h1 class="page-title">МРО 4.1.3 Обслуговування відвідувачів у буфеті та за барною стійкою</h1>
            <p class="page-subtitle">Оберіть документ для перегляду</p>
        </header>

        <div class="doc-grid">
            
            <div class="doc-card" data-src="https://drive.google.com/file/d/1iut9vSDDm2-DJ2dTWgjNxX5cKPLdT7L_/preview">
                <div class="doc-card-image">
                    <img src="https://lh3.googleusercontent.com/d/1z-0mhGiEsvPYFlCqVAk9Tg2-5jsKgdVC" alt="Обкладинка 1">
                </div>
                <h3 class="doc-card-title">1. Організація роботи бару та буфету</h3>
            </div>

            <div class="doc-card" data-src="https://drive.google.com/file/d/1PpnWY354I5MNFxZmgY2mzDcO1Z-EHC9f/preview">
                <div class="doc-card-image">
                    <img src="https://lh3.googleusercontent.com/d/1i5PSgKUVyFk-U1cD-XPaCpjgryZhfIZt" alt="Обкладинка 1">
                </div>
                <h3 class="doc-card-title">2. Товарознавство алкогольних напоїв</h3>
            </div>

            <div class="doc-card" data-src="https://drive.google.com/file/d/1eCOngpR1jjI4AGm2gwbiYRh0Viy-bw3S/preview">
                <div class="doc-card-image">
                    <img src="https://lh3.googleusercontent.com/d/1i5PSgKUVyFk-U1cD-XPaCpjgryZhfIZt" alt="Обкладинка 1">
                </div>
                <h3 class="doc-card-title">3. Безалкогольні та алкогольні змішані напої</h3>
            </div>

        </div>
    </main>

    <div id="docModal" class="modal-overlay">
        <div class="modal-window">
            <button class="modal-close" id="closeModalBtn">&times;</button>
            
            <div class="modal-body">
                <iframe src="" id="modalIframe" class="modal-iframe" allow="autoplay" loading="lazy"></iframe>
            </div>
        </div>
    </div>

    <script>
        const cards = document.querySelectorAll('.doc-card');
        const modal = document.getElementById('docModal');
        const iframe = document.getElementById('modalIframe');
        const closeBtn = document.getElementById('closeModalBtn');

        // Відкриття при натисканні на картку
        cards.forEach(card => {
            card.addEventListener('click', () => {
                const docUrl = card.getAttribute('data-src');
                iframe.src = docUrl; // Встановлюємо посилання у фрейм
                modal.classList.add('active'); // Показуємо модальне вікно
                document.body.style.overflow = 'hidden'; // Блокуємо прокрутку основного сайту
            });
        });

        // Закриття при натисканні на хрестик
        closeBtn.addEventListener('click', closeModal);

        // Закриття при натисканні на затемнений фон навколо документа
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        function closeModal() {
            modal.classList.remove('active'); // Ховаємо вікно
            iframe.src = ''; // Очищуємо фрейм, щоб документ зупинив завантаження
            document.body.style.overflow = ''; // Повертаємо прокрутку сайту
        }
    </script>

</body>
</html>
